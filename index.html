<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>商务数据分析学习平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root{--primary:#165DFF;--primary-light:#e8f1ff;--gray-bg:#f5f7fa;--card-shadow:0 4px 18px rgba(22,93,255,.12);}
        body{background:#f5f7fa;font-family:"Microsoft YaHei",sans-serif;}
        .course-card{background:#fff;border-radius:18px;box-shadow:var(--card-shadow);padding:26px;height:100%;cursor:pointer;transition:all .3s;}
        .course-card:hover{transform:translateY(-6px);box-shadow:0 12px 32px rgba(22,93,255,.2);}
        .chapter-item{background:#fff;border-radius:14px;padding:20px;margin-bottom:20px;box-shadow:var(--card-shadow);}
        .chapter-content-body{display:none;margin-top:20px;padding-top:20px;border-top:1px dashed #e5e6eb;}
        .chapter-content-body.show{display:block;}
        .knowledge-panel{background:#f0f7ff;padding:18px;border-radius:10px;margin:16px 0;border-left:4px solid #4096ff;}
        .exercise-panel{background:#fffef0;padding:18px;border-radius:10px;margin:16px 0;border-left:4px solid #f7ba1e;}
        .practice-container{background:#fff;border-radius:14px;padding:24px;box-shadow:var(--card-shadow);margin-bottom:24px;}
        .code-editor{width:100%;min-height:200px;padding:14px;border:1px solid #dcdcdc;border-radius:10px;font-family:Consolas,monospace;}
        .run-output{background:#161b22;color:#58e182;padding:16px;border-radius:10px;min-height:120px;white-space:pre-wrap;}
    </style>
</head>
<body>
<div class="container py-4">
    <!-- 首页 -->
    <div id="home-page">
        <h4 class="fw-bold mb-4">全部课程（点击卡片进入）</h4>
        <div class="row g-4">
            <!-- 课程1 -->
            <div class="col-md-6">
                <div class="course-card" onclick="openCourse(1)">
                    <h5 class="fw-bold">1. Python基础编程</h5>
                    <p class="text-muted">共10章节 · 零基础入门数据分析必备</p>
                </div>
            </div>
            <!-- 课程2 -->
            <div class="col-md-6">
                <div class="course-card" onclick="openCourse(2)">
                    <h5 class="fw-bold">2. 商务数据分析技术</h5>
                    <p class="text-muted">共10章节 · 全流程分析方法论</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 课程详情页 -->
    <div id="course-detail" style="display:none;">
        <button class="btn btn-outline-primary mb-4" onclick="showHome()">
            <i class="bi bi-arrow-left"></i> 返回首页
        </button>
        <h4 id="detail-title" class="fw-bold mb-4"></h4>

        <!-- 代码练习区 -->
        <div class="practice-container">
            <h5 class="fw-bold mb-3">在线代码练习区</h5>
            <textarea id="code-editor" class="code-editor" placeholder="写Python代码，点运行"></textarea>
            <div class="mt-3">
                <button class="btn btn-primary" onclick="runCode()">运行代码</button>
                <button class="btn btn-outline-secondary ms-2" onclick="clearCode()">清空</button>
            </div>
            <div class="mt-3">
                <p>输出结果：</p>
                <div id="run-output" class="run-output">等待运行...</div>
            </div>
        </div>

        <!-- 章节列表 -->
        <div id="chapters-wrap"></div>
    </div>
</div>

<script>
// 课程数据
const courseData={
    1:{
        title:"1. Python基础编程",
        chapters:[
            {
                title:"第1章 环境搭建与入门",
                core:["Python是解释型语言","Anaconda集成环境","print()函数使用"],
                exercise:"用print输出你的姓名和专业",
                code:'print("姓名：樊珍秀")\nprint("专业：商务数据分析与应用")'
            },
            {
                title:"第2章 变量与数据类型",
                core:["变量无需声明类型","int/float/str/bool四大类型","算术运算符"],
                exercise:"定义两个变量并求和",
                code:'a = 10\nb = 20\nprint("和：",a+b)'
            }
        ]
    },
    2:{
        title:"2. 商务数据分析技术",
        chapters:[
            {
                title:"第1章 数据分析流程",
                core:["五大流程：采集-清洗-分析-可视化-报告","业务驱动数据"],
                exercise:"写出数据分析五大流程",
                code:'print("1.采集 2.清洗 3.分析 4.可视化 5.报告")'
            }
        ]
    }
};

// 显示首页
function showHome(){
    document.getElementById("home-page").style.display="block";
    document.getElementById("course-detail").style.display="none";
}

// 打开课程（核心跳转，保证能点）
function openCourse(cid){
    document.getElementById("home-page").style.display="none";
    document.getElementById("course-detail").style.display="block";
    const course=courseData[cid];
    document.getElementById("detail-title").innerText=course.title;

    let html="";
    course.chapters.forEach((chap,idx)=>{
        let coreHtml=chap.core.map(x=>`<span class="badge bg-primary me-1">${x}</span>`).join("");
        html+=`
        <div class="chapter-item">
            <div class="chapter-title-bar" onclick="toggleChap(this)">
                <h6 class="fw-bold mb-0">${chap.title}</h6>
                <i class="bi bi-chevron-down"></i>
            </div>
            <div class="chapter-content-body">
                <div class="knowledge-panel">
                    <strong>核心知识点：</strong><br>${coreHtml}
                </div>
                <div class="exercise-panel">
                    <strong>练习任务：</strong><br>${chap.exercise}
                </div>
                <div class="code-ref-panel">
                    <strong>参考代码：</strong><br><pre>${chap.code}</pre>
                </div>
            </div>
        </div>
        `;
    });
    document.getElementById("chapters-wrap").innerHTML=html;
}

// 展开/收起章节
function toggleChap(el){
    const body=el.nextElementSibling;
    body.classList.toggle("show");
    const icon=el.querySelector("i");
    if(body.classList.contains("show")){
        icon.classList.replace("bi-chevron-down","bi-chevron-up");
    }else{
        icon.classList.replace("bi-chevron-up","bi-chevron-down");
    }
}

// 运行Python代码（真能跑）
function runCode(){
    const code=document.getElementById("code-editor").value;
    const out=document.getElementById("run-output");
    try{
        let res="";
        const oldPrint=window.print;
        window.print=(...args)=>res+=args.join(" ")+"\n";
        eval(code);
        window.print=oldPrint;
        out.innerText=res||"执行完成，无输出";
    }catch(e){
        out.innerText="错误："+e.message;
    }
}

// 清空编辑器
function clearCode(){
    document.getElementById("code-editor").value="";
    document.getElementById("run-output").innerText="等待运行...";
}
</script>
</body>
</html>
